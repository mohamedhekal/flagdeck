name: Bug report
description: Report incorrect behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or code
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: PHP / Laravel / FlagDeck
    validations:
      required: true
